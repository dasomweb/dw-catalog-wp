name: Update Plugin Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g., 1.0.1)'
        required: true
        type: string

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in plugin file
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PLUGIN_FILE="dw-product-catalog.php"
          
          # Update version in plugin header
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/Version: [0-9.]*/Version: $VERSION/" "$PLUGIN_FILE"
            sed -i '' "s/'plugin_version'[[:space:]]*=> '[0-9.]*/'plugin_version'    => '$VERSION/" "$PLUGIN_FILE"
          else
            sed -i "s/Version: [0-9.]*/Version: $VERSION/" "$PLUGIN_FILE"
            sed -i "s/'plugin_version'[[:space:]]*=> '[0-9.]*/'plugin_version'    => '$VERSION/" "$PLUGIN_FILE"
          fi
          
          echo "Updated version to $VERSION"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dw-product-catalog.php
          git commit -m "Bump version to ${{ github.event.inputs.version }}" || exit 0
          git push

      - name: Create version tag
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"


