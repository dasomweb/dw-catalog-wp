name: Create Release

on:
  push:
    tags:
      - 'v*'   # Triggers on version tags like v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for release (e.g. 1.5.0). Use when tag push did not run - tag must exist.'
        required: true
        default: '1.5.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Extract version from tag
        id: tag_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create plugin zip file
        id: create_zip
        run: |
          # 배포용 ZIP 파일명 = 반드시 버전 포함 (예: dw-product-catalog-1.5.7.zip)
          # ZIP 내용 = 루트 폴더 하나 "dw-product-catalog/" → 설치 경로 항상 wp-content/plugins/dw-product-catalog/
          PLUGIN_NAME="dw-product-catalog"
          ZIP_NAME="${PLUGIN_NAME}-${VERSION}.zip"
          
          mkdir -p temp_plugin/${PLUGIN_NAME}
          rsync -av --exclude='.git*' \
            --exclude='.github' \
            --exclude='*.DS_Store' \
            --exclude='*.log' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='DEPLOYMENT-GUIDE.md' \
            --exclude='DOMAIN-CHANGE-GUIDE.md' \
            --exclude='IMPLEMENTATION-SUMMARY.md' \
            --exclude='GITHUB-DEPLOYMENT-SUMMARY.md' \
            --exclude='verify-domain-agnostic.php' \
            --exclude='create-release.sh' \
            --exclude='temp_plugin' \
            --exclude='*.zip' \
            ./ temp_plugin/${PLUGIN_NAME}/
          
          cd temp_plugin
          zip -r "../$ZIP_NAME" "${PLUGIN_NAME}"
          cd ..
          rm -rf temp_plugin
          
          echo "zip_file=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "Created: $ZIP_NAME (install dir: wp-content/plugins/$PLUGIN_NAME/)"
        env:
          VERSION: ${{ steps.tag_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.tag_version.outputs.version }}
          files: ${{ steps.create_zip.outputs.zip_file }}
          name: Release v${{ steps.tag_version.outputs.version }}
          body: |
            ## DW Product Catalog v${{ steps.tag_version.outputs.version }}
            
            ### 설치 방법 (Installation)
            
            1. **dw-product-catalog-${{ steps.tag_version.outputs.version }}.zip** 다운로드
            2. WordPress 관리자 > 플러그인 > 새로 추가 > 플러그인 업로드
            3. ZIP 업로드 후 설치·활성화  
            → 설치 경로는 항상 `wp-content/plugins/dw-product-catalog/` (ZIP 안에 폴더명이 고정되어 있음)
            
            ### 업데이트 (Update)
            
            새 버전 ZIP을 업로드하면 기존 `dw-product-catalog` 폴더가 덮어써져 업데이트됩니다.
            
            ### 변경사항 (Changelog)
            
            자세한 변경사항은 [GitHub Releases](https://github.com/${{ github.repository }}/releases)를 확인하세요.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

