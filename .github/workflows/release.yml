name: Create Release

on:
  push:
    tags:
      - 'v*'   # Triggers on version tags like v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for release (e.g. 1.5.0). Use when tag push did not run - tag must exist.'
        required: true
        default: '1.5.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', github.event.inputs.version) || github.ref }}

      - name: Extract version from tag
        id: tag_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create plugin zip file
        run: |
          # Create zip file with plugin name
          PLUGIN_NAME="dw-product-catalog"
          ZIP_NAME="${PLUGIN_NAME}-${VERSION}.zip"
          
          # Create temporary directory for plugin files
          mkdir -p temp_plugin
          
          # Copy plugin files (excluding git and documentation)
          rsync -av --exclude='.git*' \
            --exclude='.github' \
            --exclude='*.DS_Store' \
            --exclude='*.log' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='DEPLOYMENT-GUIDE.md' \
            --exclude='DOMAIN-CHANGE-GUIDE.md' \
            --exclude='IMPLEMENTATION-SUMMARY.md' \
            --exclude='GITHUB-DEPLOYMENT-SUMMARY.md' \
            --exclude='verify-domain-agnostic.php' \
            --exclude='create-release.sh' \
            --exclude='temp_plugin' \
            --exclude='*.zip' \
            ./ temp_plugin/
          
          # Create zip from temp directory (ensures proper structure)
          cd temp_plugin
          zip -r "../$ZIP_NAME" .
          cd ..
          
          # Cleanup
          rm -rf temp_plugin
          
          echo "zip_file=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "Created: $ZIP_NAME"
        env:
          VERSION: ${{ steps.tag_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.tag_version.outputs.version }}
          files: |
            dw-product-catalog-*.zip
          name: Release v${{ steps.tag_version.outputs.version }}
          body: |
            ## DW Product Catalog v${{ steps.tag_version.outputs.version }}
            
            ### 설치 방법 (Installation)
            
            1. WordPress 관리자 페이지로 이동
            2. 플러그인 > 새로 추가
            3. 플러그인 업로드 클릭
            4. 아래 ZIP 파일을 업로드
            
            ### 업데이트 방법 (Update)
            
            플러그인이 자동으로 GitHub에서 업데이트를 확인합니다.
            WordPress 관리자 > 플러그인 페이지에서 업데이트 알림을 확인하세요.
            
            ### 변경사항 (Changelog)
            
            자세한 변경사항은 [GitHub Releases](https://github.com/${{ github.repository }}/releases)를 확인하세요.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

