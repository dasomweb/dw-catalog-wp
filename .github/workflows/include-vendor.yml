# Run this workflow once (or when composer.json changes) to commit vendor so the library is included in the repo.
name: Include vendor (PDF library)

on:
  workflow_dispatch:

jobs:
  include-vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Composer
        run: |
          cd /tmp
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer
          composer --version

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Commit and push vendor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vendor/
          if git diff --staged --quiet; then
            echo "No vendor changes to commit."
          else
            git commit -m "Include Composer vendor for PDF export (Dompdf)"
            git push
          fi
